name: Release

on:
  push:
    tags:
      - "[0-9]*"

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Generate Xcode project
        run: cd AgentSidecar && tuist generate --no-open

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          rm "$RUNNER_TEMP/certificate.p12"

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"

      - name: Build universal archive
        run: |
          xcodebuild archive \
            -project AgentSidecar/AgentSidecar.xcodeproj \
            -scheme AgentSidecar \
            -configuration Release \
            -archivePath build/AgentSidecar.xcarchive \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            CODE_SIGNING_REQUIRED=YES \
            DEVELOPMENT_TEAM=A3TR9R36A7 \
            OTHER_CODE_SIGN_FLAGS="--timestamp" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R "build/AgentSidecar.xcarchive/Products/Applications/AgentSidecar.app" build/dmg/
          hdiutil create -volname "AgentSidecar" -srcfolder build/dmg -ov -format UDZO "build/AgentSidecar.dmg"

      - name: Codesign DMG
        run: codesign --force --sign "Developer ID Application" build/AgentSidecar.dmg

      - name: Notarize DMG
        env:
          NOTARIZE_KEY_ID: ${{ secrets.NOTARIZE_KEY_ID }}
          NOTARIZE_ISSUER_ID: ${{ secrets.NOTARIZE_ISSUER_ID }}
          NOTARIZE_KEY_P8: ${{ secrets.NOTARIZE_KEY_P8 }}
        run: |
          KEY_DIR="$HOME/.private_keys"
          mkdir -p "$KEY_DIR"
          echo "$NOTARIZE_KEY_P8" | base64 --decode > "$KEY_DIR/AuthKey_${NOTARIZE_KEY_ID}.p8"

          xcrun notarytool submit build/AgentSidecar.dmg \
            --key "$KEY_DIR/AuthKey_${NOTARIZE_KEY_ID}.p8" \
            --key-id "$NOTARIZE_KEY_ID" \
            --issuer "$NOTARIZE_ISSUER_ID" \
            --wait

          xcrun stapler staple build/AgentSidecar.dmg

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" build/AgentSidecar.dmg \
            --title "${{ github.ref_name }}" \
            --generate-notes

      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          rm -rf "$HOME/.private_keys" 2>/dev/null || true
