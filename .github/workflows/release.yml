name: Release

on:
  push:
    tags:
      - "[0-9]*"

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install mise
        uses: jdx/mise-action@v2

      - name: Generate Xcode project
        run: cd AgentSidecar && tuist generate --no-open

      - name: Build universal archive
        run: |
          xcodebuild archive \
            -project AgentSidecar/AgentSidecar.xcodeproj \
            -scheme AgentSidecar \
            -configuration Release \
            -archivePath build/AgentSidecar.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO

      - name: Create DMG
        run: |
          mkdir -p build/dmg
          cp -R "build/AgentSidecar.xcarchive/Products/Applications/AgentSidecar.app" build/dmg/
          hdiutil create -volname "AgentSidecar" -srcfolder build/dmg -ov -format UDZO "build/AgentSidecar.dmg"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" build/AgentSidecar.dmg \
            --title "${{ github.ref_name }}" \
            --generate-notes
