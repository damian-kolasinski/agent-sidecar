name: AgentSidecar
options:
  bundleIdPrefix: com.agentsidecar
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Debug
settings:
  SWIFT_VERSION: "6.0"
  MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  AgentSidecar:
    type: application
    platform: macOS
    sources:
      - path: AgentSidecar
        excludes:
          - "**/.DS_Store"
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.agentsidecar.app
      PRODUCT_NAME: AgentSidecar
      INFOPLIST_FILE: AgentSidecar/Resources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_KEY_CFBundleDisplayName: AgentSidecar
      INFOPLIST_KEY_NSMainNibFile: ""
      INFOPLIST_KEY_NSPrincipalClass: NSApplication
      SWIFT_STRICT_CONCURRENCY: complete
      ENABLE_APP_SANDBOX: false
    info:
      path: AgentSidecar/Resources/Info.plist
      properties:
        CFBundleURLTypes:
          - CFBundleURLName: com.agentsidecar.deeplink
            CFBundleURLSchemes:
              - agentsidecar

  AgentSidecarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgentSidecarTests
        excludes:
          - "**/.DS_Store"
    dependencies:
      - target: AgentSidecar
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.agentsidecar.tests
      SWIFT_VERSION: "6.0"
      GENERATE_INFOPLIST_FILE: true
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/AgentSidecar.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/AgentSidecar"
      BUNDLE_LOADER: "$(TEST_HOST)"
